<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="src/styles.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <nav class="navbar" v-if="isLoggedIn">
            <div class="container">
                <div class="d-flex align-items-center">
                    <a class="navbar-brand" href="#">Placement Portal</a>
                    <button v-if="userRole === 'student' || userRole === 'company' || userRole === 'admin'" class="btn btn-sm btn-primary ms-3 position-relative" @click="toggleNotifications">
                        Notifications
                        <span v-if="unreadCount > 0" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">{{ unreadCount }}</span>
                    </button>
                </div>
                <div class="navbar-nav ms-auto">
                    <span class="navbar-text me-3" style="color: #666;">{{ userRole.toUpperCase() }}</span>
                    <button class="btn btn-sm btn-danger" @click="logout">Logout</button>
                </div>
            </div>
        </nav>

        <div v-if="showNotifications" class="notification-panel">
            <div class="notification-header">
                <h5>Notifications</h5>
                <button class="btn-close" @click="showNotifications = false"></button>
            </div>
            <div class="notification-body">
                <div v-if="notifications.length === 0" class="text-muted text-center p-3">No notifications</div>
                <div v-for="notif in notifications" :key="notif.id" class="notification-item" :class="seenIds.includes(notif.id) ? 'notif-seen' : 'notif-unseen'" @click="markSeen(notif.id)">
                    <div class="notification-content">
                        <strong>{{ notif.title }}</strong>
                        <p>{{ notif.message }}</p>
                        <small class="text-muted">{{ notif.date }}</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <component :is="currentView" @change-view="changeView" @login-success="handleLogin"></component>
        </div>
    </div>

    <script src="src/app.js"></script>
</body>
</html>
